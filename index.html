<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual-Pathway Fluorescence Sensor Standard Curve Optimization Analysis (6 Orders of Magnitude)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Arial, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
padding: 20px;
min-height: 100vh;
}
.container {
max-width: 1400px;
margin: 0 auto;
background: white;
border-radius: 20px;
padding: 30px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
color: #667eea;
text-align: center;
margin-bottom: 10px;
font-size: 28px;
}
.subtitle {
text-align: center;
color: #666;
margin-bottom: 30px;
font-size: 14px;
}
.method-selector {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 15px;
margin-bottom: 30px;
}
.method-card {
border: 2px solid #e0e0e0;
border-radius: 12px;
padding: 15px;
cursor: pointer;
transition: all 0.3s;
background: #f9f9f9;
}
.method-card:hover {
border-color: #667eea;
transform: translateY(-2px);
box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
}
.method-card.active {
border-color: #667eea;
background: linear-gradient(135deg, #667eea15, #764ba215);
}
.method-card h3 {
color: #667eea;
font-size: 16px;
margin-bottom: 8px;
}
.method-card p {
color: #666;
font-size: 13px;
line-height: 1.5;
}
.results-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 20px;
margin-bottom: 30px;
}
.result-card {
background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
padding: 20px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.result-card h3 {
color: #333;
margin-bottom: 15px;
font-size: 18px;
}
.metric {
display: flex;
justify-content: space-between;
margin: 10px 0;
padding: 8px;
background: rgba(255,255,255,0.7);
border-radius: 6px;
}
.metric-label {
font-weight: 600;
color: #555;
}
.metric-value {
color: #667eea;
font-weight: bold;
}
.chart-container {
margin-bottom: 30px;
background: white;
padding: 20px;
border-radius: 12px;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
canvas {
max-height: 400px;
}
.data-table {
width: 100%;
border-collapse: collapse;
margin: 20px 0;
font-size: 14px;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
border-radius: 8px;
overflow: hidden;
}
.data-table th {
background: linear-gradient(135deg, #667eea, #764ba2);
color: white;
padding: 12px;
text-align: center;
}
.data-table td {
padding: 10px;
text-align: center;
border-bottom: 1px solid #e0e0e0;
}
.data-table tr:hover {
background: #f5f5f5;
}
.export-btn {
background: linear-gradient(135deg, #667eea, #764ba2);
color: white;
border: none;
padding: 12px 30px;
border-radius: 8px;
cursor: pointer;
font-size: 16px;
font-weight: 600;
margin: 10px 5px;
transition: all 0.3s;
}
.export-btn:hover {
transform: translateY(-2px);
box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}
.btn-container {
text-align: center;
margin: 20px 0;
}
.best-indicator {
display: inline-block;
background: #4CAF50;
color: white;
padding: 4px 12px;
border-radius: 12px;
font-size: 12px;
font-weight: bold;
margin-left: 10px;
}
@media (max-width: 768px) {
.container {
padding: 15px;
}
h1 {
font-size: 22px;
}
.method-selector {
grid-template-columns: 1fr;
}
.results-grid {
grid-template-columns: 1fr;
}
}
</style>
</head>
<body>
<div class="container">
<h1>🔬 Dual-Pathway Fluorescence Sensor Standard Curve Optimization Analysis</h1>
<p class="subtitle">Multi-Strategy Standard Curve Construction and Optimization Based on Exo III and HCR Dual-Signal Pathways (6 Orders of Magnitude)</p>

<div class="method-selector" id="methodSelector"></div>

<div class="results-grid" id="resultsGrid"></div>

<div class="chart-container">
<canvas id="calibrationChart"></canvas>
</div>

<div class="chart-container">
<canvas id="comparisonChart"></canvas>
</div>

<div id="dataTableContainer"></div>

<div class="btn-container">
<button class="export-btn" onclick="exportResults()">📊 Export Full Results</button>
<button class="export-btn" onclick="exportBestMethod()">⭐ Export Best Method</button>
</div>
</div>
<script>
// Raw data - Updated with 6 Orders of Magnitude Data
const rawData = {
exo3: {
concentrations: [-10, -9, -8, -7, -6, -5],
blank: [604.65, 618.349, 655.65],
readings: [
[814, 865.004, 932],          // -10
[1201, 1324, 1473.07],        // -9
[1599, 1625, 1807.9],         // -8
[1925, 2024.98, 2111],        // -7
[2311, 2356.38, 2417.55],     // -6
[2415, 2468.34, 2604]         // -5
]
},
hcr: {
concentrations: [-10, -9, -8, -7, -6, -5],
blank: [1822, 1994.33, 2351],
readings: [
[2140, 2242.25, 2511],        // -10
[2365, 2697.2, 2787],         // -9
[2769, 2991.67, 3266],        // -8
[3594, 3898.91, 4011],        // -7
[4698, 4723.9, 5001],         // -6
[5124, 5481.3, 5687]          // -5
]
}
};

// Calculate statistics
function calculateStats(arr) {
const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
const stdev = Math.sqrt(arr.reduce((sq, n) => sq + Math.pow(n - mean, 2), 0) / arr.length);
return { mean, stdev };
}
// Process data
const processedData = {
exo3: {
blank: calculateStats(rawData.exo3.blank),
data: rawData.exo3.readings.map((readings, i) => {
const stats = calculateStats(readings);
return {
concentration: rawData.exo3.concentrations[i],
mean: stats.mean,
stdev: stats.stdev,
signal: stats.mean - calculateStats(rawData.exo3.blank).mean
};
})
},
hcr: {
blank: calculateStats(rawData.hcr.blank),
data: rawData.hcr.readings.map((readings, i) => {
const stats = calculateStats(readings);
return {
concentration: rawData.hcr.concentrations[i],
mean: stats.mean,
stdev: stats.stdev,
signal: stats.mean - calculateStats(rawData.hcr.blank).mean
};
})
}
};
// Linear regression
function linearRegression(x, y) {
const n = x.length;
const sumX = x.reduce((a, b) => a + b, 0);
const sumY = y.reduce((a, b) => a + b, 0);
const sumXY = x.reduce((sum, xi, i) => sum + xi * y[i], 0);
const sumXX = x.reduce((sum, xi) => sum + xi * xi, 0);

const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
const intercept = (sumY - slope * sumX) / n;

// Calculate R²
const yMean = sumY / n;
const ssTotal = y.reduce((sum, yi) => sum + Math.pow(yi - yMean, 2), 0);
const ssResidual = y.reduce((sum, yi, i) => sum + Math.pow(yi - (slope * x[i] + intercept), 2), 0);
const r2 = 1 - (ssResidual / ssTotal);

return { slope, intercept, r2 };
}
// Define analysis methods
const methods = [
{
id: 'ratio',
name: 'Signal Ratio Method',
description: 'HCR/Exo III ratio, eliminates systematic errors and improves stability',
calculate: () => {
const x = processedData.exo3.data.map(d => d.concentration);
const y = processedData.exo3.data.map((d, i) =>
processedData.hcr.data[i].signal / d.signal
);
return linearRegression(x, y);
}
},
{
id: 'weighted',
name: 'Weighted Average Method',
description: 'SNR-based weighted combination, balances contributions from both pathways',
calculate: () => {
const x = processedData.exo3.data.map(d => d.concentration);

// Calculate SNR for each pathway
const exo3SNR = processedData.exo3.data.map(d => d.signal / d.stdev);
const hcrSNR = processedData.hcr.data.map(d => d.signal / d.stdev);

const avgExo3SNR = exo3SNR.reduce((a, b) => a + b, 0) / exo3SNR.length;
const avgHcrSNR = hcrSNR.reduce((a, b) => a + b, 0) / hcrSNR.length;

const totalSNR = avgExo3SNR + avgHcrSNR;
const w1 = avgExo3SNR / totalSNR;
const w2 = avgHcrSNR / totalSNR;

// Normalize signals
const maxExo3 = Math.max(...processedData.exo3.data.map(d => d.signal));
const maxHcr = Math.max(...processedData.hcr.data.map(d => d.signal));

const y = processedData.exo3.data.map((d, i) =>
w1 * (d.signal / maxExo3) + w2 * (processedData.hcr.data[i].signal / maxHcr)
);

const result = linearRegression(x, y);
result.weights = { exo3: w1.toFixed(3), hcr: w2.toFixed(3) };
return result;
}
},
{
id: 'sum',
name: 'Normalized Sum Method',
description: 'Sum after normalization, simple and effective signal enhancement',
calculate: () => {
const x = processedData.exo3.data.map(d => d.concentration);

const maxExo3 = Math.max(...processedData.exo3.data.map(d => d.signal));
const maxHcr = Math.max(...processedData.hcr.data.map(d => d.signal));

const y = processedData.exo3.data.map((d, i) =>
(d.signal / maxExo3) + (processedData.hcr.data[i].signal / maxHcr)
);

return linearRegression(x, y);
}
},
{
id: 'product',
name: 'Signal Product Method',
description: 'Product of two pathway signals, amplifies dual-positive signals',
calculate: () => {
const x = processedData.exo3.data.map(d => d.concentration);
const y = processedData.exo3.data.map((d, i) =>
Math.log10(d.signal * processedData.hcr.data[i].signal)
);
return linearRegression(x, y);
}
},
{
id: 'exo3',
name: 'Exo III Single Pathway',
description: 'Using only Exo III pathway as control',
calculate: () => {
const x = processedData.exo3.data.map(d => d.concentration);
const y = processedData.exo3.data.map(d => d.signal);
return linearRegression(x, y);
}
},
{
id: 'hcr',
name: 'HCR Single Pathway',
description: 'Using only HCR pathway as control',
calculate: () => {
const x = processedData.hcr.data.map(d => d.concentration);
const y = processedData.hcr.data.map(d => d.signal);
return linearRegression(x, y);
}
}
];
// Calculate results for all methods
const results = methods.map(method => ({
...method,
result: method.calculate()
}));
// Find best method
const bestMethod = results.reduce((best, current) =>
current.result.r2 > best.result.r2 ? current : best
);
let selectedMethod = bestMethod;
let charts = { calibration: null, comparison: null };
// Render method selector
function renderMethodSelector() {
const container = document.getElementById('methodSelector');
container.innerHTML = methods.map(method => `
<div class="method-card ${method.id === selectedMethod.id ? 'active' : ''}"
onclick="selectMethod('${method.id}')">
<h3>${method.name} ${method.id === bestMethod.id ? '<span class="best-indicator">Best</span>' : ''}</h3>
<p>${method.description}</p>
</div>
`).join('');
}
// Select method
function selectMethod(methodId) {
selectedMethod = results.find(m => m.id === methodId);
renderMethodSelector();
renderResults();
updateCharts();
}
// Render results
function renderResults() {
const container = document.getElementById('resultsGrid');
const result = selectedMethod.result;

container.innerHTML = `
<div class="result-card">
<h3>📈 Regression Equation</h3>
<div class="metric">
<span class="metric-label">Slope:</span>
<span class="metric-value">${result.slope.toFixed(4)}</span>
</div>
<div class="metric">
<span class="metric-label">Intercept:</span>
<span class="metric-value">${result.intercept.toFixed(4)}</span>
</div>
<div class="metric">
<span class="metric-label">Equation:</span>
<span class="metric-value">y = ${result.slope.toFixed(4)}x + ${result.intercept.toFixed(4)}</span>
</div>
</div>

<div class="result-card">
<h3>📊 Fitting Quality</h3>
<div class="metric">
<span class="metric-label">R² Value:</span>
<span class="metric-value">${result.r2.toFixed(6)}</span>
</div>
<div class="metric">
<span class="metric-label">Correlation Coefficient (r):</span>
<span class="metric-value">${Math.sqrt(result.r2).toFixed(6)}</span>
</div>
${result.weights ? `
<div class="metric">
<span class="metric-label">Weights (Exo III / HCR):</span>
<span class="metric-value">${result.weights.exo3} / ${result.weights.hcr}</span>
</div>
` : ''}
</div>

<div class="result-card">
<h3>🎯 Detection Performance</h3>
<div class="metric">
<span class="metric-label">Sensitivity:</span>
<span class="metric-value">${Math.abs(result.slope).toFixed(4)}</span>
</div>
<div class="metric">
<span class="metric-label">Linear Range:</span>
<span class="metric-value">10⁻¹⁰ - 10⁻⁵</span>
</div>
<div class="metric">
<span class="metric-label">Data Points:</span>
<span class="metric-value">${processedData.exo3.data.length}</span>
</div>
</div>
`;
}
// Update charts
function updateCharts() {
updateCalibrationChart();
updateComparisonChart();
}
// Update calibration chart
function updateCalibrationChart() {
const ctx = document.getElementById('calibrationChart');
const x = processedData.exo3.data.map(d => d.concentration);

// Calculate y values based on selected method
let y, yLabel;
if (selectedMethod.id === 'ratio') {
y = processedData.exo3.data.map((d, i) =>
processedData.hcr.data[i].signal / d.signal
);
yLabel = 'Signal Ratio (HCR/Exo III)';
} else if (selectedMethod.id === 'weighted') {
const maxExo3 = Math.max(...processedData.exo3.data.map(d => d.signal));
const maxHcr = Math.max(...processedData.hcr.data.map(d => d.signal));
const exo3SNR = processedData.exo3.data.map(d => d.signal / d.stdev);
const hcrSNR = processedData.hcr.data.map(d => d.signal / d.stdev);
const avgExo3SNR = exo3SNR.reduce((a, b) => a + b, 0) / exo3SNR.length;
const avgHcrSNR = hcrSNR.reduce((a, b) => a + b, 0) / hcrSNR.length;
const totalSNR = avgExo3SNR + avgHcrSNR;
const w1 = avgExo3SNR / totalSNR;
const w2 = avgHcrSNR / totalSNR;
y = processedData.exo3.data.map((d, i) =>
w1 * (d.signal / maxExo3) + w2 * (processedData.hcr.data[i].signal / maxHcr)
);
yLabel = 'Weighted Normalized Signal';
} else if (selectedMethod.id === 'sum') {
const maxExo3 = Math.max(...processedData.exo3.data.map(d => d.signal));
const maxHcr = Math.max(...processedData.hcr.data.map(d => d.signal));
y = processedData.exo3.data.map((d, i) =>
(d.signal / maxExo3) + (processedData.hcr.data[i].signal / maxHcr)
);
yLabel = 'Normalized Signal Sum';
} else if (selectedMethod.id === 'product') {
y = processedData.exo3.data.map((d, i) =>
Math.log10(d.signal * processedData.hcr.data[i].signal)
);
yLabel = 'log₁₀(Signal Product)';
} else if (selectedMethod.id === 'exo3') {
y = processedData.exo3.data.map(d => d.signal);
yLabel = 'Exo III Signal Intensity';
} else {
y = processedData.hcr.data.map(d => d.signal);
yLabel = 'HCR Signal Intensity';
}

// Calculate fitted line
const result = selectedMethod.result;
const fittedY = x.map(xi => result.slope * xi + result.intercept);

if (charts.calibration) {
charts.calibration.destroy();
}

charts.calibration = new Chart(ctx, {
type: 'scatter',
data: {
datasets: [
{
label: 'Experimental Data',
data: x.map((xi, i) => ({ x: xi, y: y[i] })),
backgroundColor: 'rgba(102, 126, 234, 0.6)',
borderColor: 'rgba(102, 126, 234, 1)',
pointRadius: 6,
pointHoverRadius: 8
},
{
label: 'Fitted Line',
data: x.map((xi, i) => ({ x: xi, y: fittedY[i] })),
type: 'line',
borderColor: 'rgba(255, 99, 132, 1)',
borderWidth: 2,
fill: false,
pointRadius: 0
}
]
},
options: {
responsive: true,
maintainAspectRatio: true,
plugins: {
title: {
display: true,
text: `${selectedMethod.name} - Calibration Curve (R² = ${result.r2.toFixed(6)})`,
font: { size: 16, weight: 'bold' }
},
legend: {
display: true,
position: 'top'
}
},
scales: {
x: {
title: {
display: true,
text: 'lg(Concentration)',
font: { size: 14, weight: 'bold' }
}
},
y: {
title: {
display: true,
text: yLabel,
font: { size: 14, weight: 'bold' }
}
}
}
}
});
}
// Update comparison chart
function updateComparisonChart() {
const ctx = document.getElementById('comparisonChart');

if (charts.comparison) {
charts.comparison.destroy();
}

const sortedResults = [...results].sort((a, b) => b.result.r2 - a.result.r2);

charts.comparison = new Chart(ctx, {
type: 'bar',
data: {
labels: sortedResults.map(r => r.name),
datasets: [{
label: 'R² Value',
data: sortedResults.map(r => r.result.r2),
backgroundColor: sortedResults.map(r =>
r.id === selectedMethod.id
? 'rgba(102, 126, 234, 0.8)'
: 'rgba(200, 200, 200, 0.6)'
),
borderColor: sortedResults.map(r =>
r.id === selectedMethod.id
? 'rgba(102, 126, 234, 1)'
: 'rgba(200, 200, 200, 1)'
),
borderWidth: 2
}]
},
options: {
responsive: true,
maintainAspectRatio: true,
plugins: {
title: {
display: true,
text: 'R² Value Comparison Across Methods',
font: { size: 16, weight: 'bold' }
},
legend: {
display: false
}
},
scales: {
y: {
beginAtZero: false,
min: Math.min(...sortedResults.map(r => r.result.r2)) * 0.995,
title: {
display: true,
text: 'R² Value',
font: { size: 14, weight: 'bold' }
}
}
}
}
});
}
// Render data table
function renderDataTable() {
const container = document.getElementById('dataTableContainer');

let html = '<h2 style="text-align: center; margin: 30px 0 20px;">📋 Detailed Data Table</h2>';

// Exo III data table
html += '<h3 style="margin: 20px 0;">Exo III Pathway Data</h3>';
html += '<table class="data-table"><thead><tr>';
html += '<th>lg(Concentration)</th><th>Mean</th><th>Std Dev</th><th>Blank-Corrected Signal</th><th>CV%</th></tr></thead><tbody>';

processedData.exo3.data.forEach(d => {
const cv = (d.stdev / d.mean * 100).toFixed(2);
html += `<tr>
<td>${d.concentration}</td>
<td>${d.mean.toFixed(2)}</td>
<td>${d.stdev.toFixed(2)}</td>
<td>${d.signal.toFixed(2)}</td>
<td>${cv}%</td>
</tr>`;
});
html += '</tbody></table>';

// HCR data table
html += '<h3 style="margin: 20px 0;">HCR Pathway Data</h3>';
html += '<table class="data-table"><thead><tr>';
html += '<th>lg(Concentration)</th><th>Mean</th><th>Std Dev</th><th>Blank-Corrected Signal</th><th>CV%</th></tr></thead><tbody>';

processedData.hcr.data.forEach(d => {
const cv = (d.stdev / d.mean * 100).toFixed(2);
html += `<tr>
<td>${d.concentration}</td>
<td>${d.mean.toFixed(2)}</td>
<td>${d.stdev.toFixed(2)}</td>
<td>${d.signal.toFixed(2)}</td>
<td>${cv}%</td>
</tr>`;
});
html += '</tbody></table>';

// Method comparison table
html += '<h3 style="margin: 20px 0;">Standard Curve Parameter Comparison Across Methods</h3>';
html += '<table class="data-table"><thead><tr>';
html += '<th>Method</th><th>Slope</th><th>Intercept</th><th>R²</th><th>Correlation Coefficient</th></tr></thead><tbody>';

results.sort((a, b) => b.result.r2 - a.result.r2).forEach(r => {
const isBest = r.id === bestMethod.id;
html += `<tr style="${isBest ? 'background: #e8f5e9; font-weight: bold;' : ''}">
<td>${r.name}${isBest ? ' ⭐' : ''}</td>
<td>${r.result.slope.toFixed(4)}</td>
<td>${r.result.intercept.toFixed(4)}</td>
<td>${r.result.r2.toFixed(6)}</td>
<td>${Math.sqrt(r.result.r2).toFixed(6)}</td>
</tr>`;
});
html += '</tbody></table>';

container.innerHTML = html;
}
// Export full results
function exportResults() {
let text = 'Dual-Pathway Fluorescence Sensor Standard Curve Optimization Analysis Report\n';
text += '='.repeat(60) + '\n\n';
text += `Analysis Date: ${new Date().toLocaleString('en-US')}\n\n`;

text += '1. Standard Curve Parameters for Each Method\n';
text += '-'.repeat(60) + '\n';
results.sort((a, b) => b.result.r2 - a.result.r2).forEach((r, i) => {
text += `${i + 1}. ${r.name}\n`;
text += `   Description: ${r.description}\n`;
text += `   Slope: ${r.result.slope.toFixed(4)}\n`;
text += `   Intercept: ${r.result.intercept.toFixed(4)}\n`;
text += `   R²: ${r.result.r2.toFixed(6)}\n`;
text += `   Correlation Coefficient: ${Math.sqrt(r.result.r2).toFixed(6)}\n`;
text += `   Equation: y = ${r.result.slope.toFixed(4)}x + ${r.result.intercept.toFixed(4)}\n`;
if (r.result.weights) {
text += `   Weights (Exo III / HCR): ${r.result.weights.exo3} / ${r.result.weights.hcr}\n`;
}
text += '\n';
});

text += '\n2. Recommended Method\n';
text += '-'.repeat(60) + '\n';
text += `Best Method: ${bestMethod.name}\n`;
text += `R² Value: ${bestMethod.result.r2.toFixed(6)}\n`;
text += `Recommendation Rationale: Highest R² value, best linear relationship\n\n`;

text += '\n3. Raw Data\n';
text += '-'.repeat(60) + '\n';
text += 'Exo III Pathway:\n';
text += 'lg(Conc.)\tMean\tStd Dev\tBlank-Corr Signal\tCV%\n';
processedData.exo3.data.forEach(d => {
text += `${d.concentration}\t${d.mean.toFixed(2)}\t${d.stdev.toFixed(2)}\t${d.signal.toFixed(2)}\t${(d.stdev/d.mean*100).toFixed(2)}%\n`;
});

text += '\nHCR Pathway:\n';
text += 'lg(Conc.)\tMean\tStd Dev\tBlank-Corr Signal\tCV%\n';
processedData.hcr.data.forEach(d => {
text += `${d.concentration}\t${d.mean.toFixed(2)}\t${d.stdev.toFixed(2)}\t${d.signal.toFixed(2)}\t${(d.stdev/d.mean*100).toFixed(2)}%\n`;
});

const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'Dual-Pathway_Standard_Curve_Full_Analysis_Report.txt';
a.click();
}
// Export best method
function exportBestMethod() {

text += '='.repeat(60) + '\n\n';
text += `Method Description: ${bestMethod.description}\n\n`;

text += 'Fitting Quality Parameters:\n';
text += `R² = ${bestMethod.result.r2.toFixed(6)}\n`;
text += `Correlation Coefficient r = ${Math.sqrt(bestMethod.result.r2).toFixed(6)}\n`;
text += `Slope = ${bestMethod.result.slope.toFixed(4)}\n`;
text += `Intercept = ${bestMethod.result.intercept.toFixed(4)}\n\n`;

if (bestMethod.result.weights) {

text += `HCR Weight = ${bestMethod.result.weights.hcr}\n\n`;
}

text += 'Suggestions for Scientific Writing:\n';
text += '1. Explain the advantages of the dual-pathway system in the Methods section\n';

}
